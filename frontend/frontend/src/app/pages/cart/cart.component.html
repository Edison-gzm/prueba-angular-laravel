<div class="max-w-3xl mx-auto space-y-6">
  <h2 class="text-2xl font-bold text-slate-800">🛒 Carrito</h2>

  <div *ngIf="cartService.items().length === 0" class="text-slate-600">
    El carrito está vacío
  </div>

  <div *ngFor="let item of cartService.items()" class="flex items-center justify-between bg-white rounded shadow px-4 py-3">
    <div>
      <h4 class="font-semibold text-slate-800">{{ item.name }}</h4>
      <p class="text-sm text-slate-500">Precio: {{ item.price }}</p>
    </div>

    <div class="flex items-center gap-2">
      <button (click)="cartService.decrease(item.id)" class="px-2 py-1 bg-slate-200 rounded">-</button>
      <span>{{ item.quantity }}</span>
      <button (click)="cartService.increase(item.id)" class="px-2 py-1 bg-slate-200 rounded">+</button>
    </div>

    <button (click)="cartService.remove(item.id)" class="text-red-600 text-sm">
      ❌ Eliminar
    </button>
  </div>

  <h3 class="text-xl font-semibold text-slate-800">
    Total: {{ cartService.total() }}
  </h3>

  <div class="flex gap-3">
    <button
      (click)="checkout()"
      [disabled]="checkoutLoading || cartService.items().length === 0"
      class="px-4 py-2 rounded bg-blue-600 text-white disabled:bg-slate-400"
    >
      @if (checkoutLoading) { Procesando... } @else { Comprar }
    </button>

    <button
      (click)="cartService.clearCart()"
      [disabled]="cartService.items().length === 0"
      class="px-4 py-2 rounded bg-slate-200 text-slate-800 disabled:bg-slate-100"
    >
      Vaciar carrito
    </button>
  </div>
</div>

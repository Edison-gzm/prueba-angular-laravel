<div style="max-width:400px; margin:auto; margin-top:60px;">

  <h2>Registro</h2>

  <form (ngSubmit)="register()">

    <input
      type="text"
      placeholder="Nombre"
      [(ngModel)]="name"
      name="name"
      required
      style="width:100%; margin-bottom:10px; padding:8px;"
    >

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email"
      name="email"
      required
      style="width:100%; margin-bottom:10px; padding:8px;"
    >

    <input
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="password"
      name="password"
      required
      style="width:100%; margin-bottom:10px; padding:8px;"
    >

    <button type="submit" style="width:100%; padding:10px;">
      Registrarse
    </button>

  </form>

</div>

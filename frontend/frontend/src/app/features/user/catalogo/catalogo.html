
<div class="min-h-screen bg-gray-100 p-8">

  <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">
    Catálogo de Productos
  </h1>

  <!-- BOTONES SOLO ADMIN -->

  <div *ngIf="authService.isAdmin()" class="flex justify-center gap-4 mb-8">

    <a routerLink="/admin/users">
      <button class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition">
        Gestionar Usuarios
      </button>
    </a>

    <a routerLink="/admin/products">
      <button class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
        Gestionar Productos
      </button>
    </a>

  </div>

  <!-- GRID DE PRODUCTOS -->

  <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">

    @for (producto of productos; track producto.id) {

      <div class="bg-white p-6 rounded-xl shadow-md hover:shadow-lg transition-shadow">

        <h2 class="text-xl font-bold text-gray-700 mb-2">
          {{ producto.name }}
        </h2>

        <p class="text-gray-500 mb-2">
          {{ producto.Category }}
        </p>

        <p class="text-blue-600 font-semibold text-lg mb-2">
          ${{ producto.price }}
        </p>

        <p class="text-sm text-gray-400 mb-4">
          Stock: {{ producto.stock }}
        </p>

        <!-- BOTÓN COMPRAR -->

        <button
          (click)="addToCart(producto)"
          class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors">
          Comprar Ahora
        </button>

      </div>

    } @empty {

      <p class="text-center col-span-full text-gray-500">
        No hay productos disponibles.
      </p>

    }

  </div>

</div>
